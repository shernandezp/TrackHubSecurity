name: sync
on:
  schedule: [{cron: '0 6 * * *'}]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    if: github.repository_owner == 'c2ls'
    runs-on: ubuntu-latest
    steps:
      - run: |
          gh repo sync ${{ github.repository }} -b master
          gh repo sync ${{ github.repository }} -b develop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
